<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · Study Planner</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="Login.css">
      <script src="darkmode.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="login-container">
        <a href="Index.html" class="login-back">← Back to home</a>
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon" aria-hidden="true">
                    <svg class="icon icon-xl" viewBox="0 0 24 24"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
                </div>
                <h1>Create your account</h1>
                <p>Set up profile details after you sign in</p>
            </div>

            <div class="alert alert-danger hidden" id="errorMsg">
                <span id="errorText">Could not create account</span>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@uea.ac.uk" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
                </div>
                <button type="submit" id="registerBtn" class="btn-login">Create account</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="Login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        if (isLoggedIn()) {
            window.location.href = 'Dashboard.html';
        }

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = 'Creating…';
            errorMsg.classList.add('hidden');

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        if (response.status === 429) {
                            throw new Error(data.message ||
                                'Too many accounts created. Please wait a while before trying again.');
                        }
                        throw new Error(data.message || 'Could not create account');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    saveToken(data.token);
                    localStorage.setItem('username', username);
                    window.location.href = 'Dashboard.html';
                } else {
                    throw new Error('No token received from server');
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.textContent = originalText;
                document.getElementById('errorText').textContent = error.message || 'Could not create account';
                errorMsg.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>

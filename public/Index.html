
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner – Login</title>
    <link rel="stylesheet" href="index.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">📚</div>
                <h1>Study Planner</h1>
                <p>Sign in to your account</p>
            </div>

            <div class="alert alert-danger hidden" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText">Invalid username or password</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
            </form>

            <div class="login-footer">
                <p><strong>Demo:</strong> username: <code>demo</code> | password: <code>demo123</code></p>
            </div>
        </div>
    </div>

    <script>
        if (isLoggedIn()) {
            window.location.href = 'Dashboard.html';
        }

        // seed demo user on page load
        function seedDemoUser() {
            fetch('/api/seed', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log('Demo user ready:', data.username);
                })
                .catch(err => console.log('Demo user setup:', err.message));
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', seedDemoUser);
        } else {
            seedDemoUser();
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            loginBtn.disabled = true;
            const originalText = loginBtn.textContent;
            loginBtn.textContent = '⏳ Signing in...';
            errorMsg.classList.add('hidden');
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.message || data.error || 'Invalid username or password');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    saveToken(data.token);
                    if (data.username) {
                        localStorage.setItem('username', data.username);
                    }
                    window.location.href = 'Dashboard.html';
                } else {
                    throw new Error('No token received from server');
                }
            })
            .catch(error => {
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
                const errorText = error.message || 'Network error. Please check your connection and try again.';
                document.getElementById('errorText').textContent = errorText;
                errorMsg.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
